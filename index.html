<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Arial, sans-serif;
      font-size: 16px;
      color: #1f2937;
      background: #eef5fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 40%), #eef5fb;
      padding: 1.5rem;
    }

    .todo-container {
      width: min(100%, 520px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, #ffffff 100%);
      padding: 2rem;
      border-radius: 32px;
      box-shadow: 0 32px 80px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(15, 23, 42, 0.08);
      position: relative;
      overflow: hidden;
    }

    .todo-container::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -80px;
      width: 180px;
      height: 180px;
      background: rgba(37, 99, 235, 0.08);
      border-radius: 50%;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: #111827;
      position: relative;
      z-index: 1;
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 24px;
      background: #f8fbff;
      border: 1px solid #dbeafe;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: #ffffff;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    .profile-details {
      display: grid;
      gap: 0.15rem;
    }

    .profile-details h2 {
      margin: 0;
      font-size: 1.05rem;
      color: #111827;
    }

    .profile-details p {
      margin: 0;
      color: #475569;
      font-size: 0.95rem;
    }

    .input-group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    button {
      padding: 0.95rem 1rem;
      border: none;
      border-radius: 16px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .task-count {
      font-size: 0.95rem;
      color: #4b5563;
    }

    .clear-button {
      background: #e2e8f0;
      color: #111827;
      box-shadow: none;
    }

    .clear-button:hover {
      background: #cbd5e1;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.75rem;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.95rem 1rem;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .task-item:hover {
      transform: translateY(-1px);
      background: #f1f5f9;
    }

    .task-item.completed {
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .task-content {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex: 1;
      min-width: 0;
    }

    .task-content span {
      display: block;
      min-width: 0;
      font-size: 1rem;
      color: #0f172a;
    }

    .task-item.completed .task-content span {
      color: #475569;
      text-decoration: line-through;
    }

    .task-checkbox {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-left: 1rem;
      flex-shrink: 0;
    }

    .remove-button {
      border: none;
      border-radius: 14px;
      background: #ef4444;
      color: #ffffff;
      cursor: pointer;
      padding: 0.7rem 1rem;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .remove-button:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    @media (max-width: 500px) {
      .input-group,
      .button-group {
        grid-template-columns: 1fr;
      }

      .task-actions {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <section class="todo-container">
    <div class="profile-card">
      <div class="avatar">TU</div>
      <div class="profile-details">
        <p>Perfil</p>
        <h2>Thiago</h2>
        <p>Organize seu dia em poucos minutos</p>
      </div>
    </div>
    <h1>Lista de Tarefas</h1>
    <div class="input-group">
      <input id="task-input" type="text" placeholder="Digite uma nova tarefa" aria-label="Nova tarefa" autocomplete="off" />
      <button id="add-button" type="button">Adicionar</button>
    </div>
    <div class="button-group">
      <span id="task-count" class="task-count">Nenhuma tarefa ainda</span>
      <button id="clear-button" type="button" class="clear-button">Limpar lista</button>
    </div>
    <ul id="task-list" aria-live="polite"></ul>
  </section>

  <script src="src/script.js"></script>
</body>
</html>

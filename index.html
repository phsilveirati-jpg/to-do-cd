<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f7f7f7;
    }

    .todo-container {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.9rem;
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 6px;
      background: #007acc;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #005ea7;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 0.75rem;
      margin-bottom: 0.65rem;
      border: 1px solid #e1e1e1;
      border-radius: 8px;
      background: #fafafa;
    }

    .remove-button {
      border: none;
      border-radius: 6px;
      background: #e74c3c;
      color: #fff;
      cursor: pointer;
      padding: 0.55rem 0.8rem;
    }

    .remove-button:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <section class="todo-container">
    <h1>Lista de Tarefas</h1>
    <div class="input-group">
      <input id="task-input" type="text" placeholder="Digite uma nova tarefa" aria-label="Nova tarefa" />
      <button id="add-button" type="button">Adicionar</button>
    </div>
    <ul id="task-list" aria-live="polite"></ul>
  </section>

  <script src="src/script.js"></script>
</body>
</html>
